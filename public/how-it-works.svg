<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 720" role="img" aria-labelledby="title desc">
  <title id="title">How LocalCouncil works</title>
  <desc id="desc">A chat mockup showing the user asking a question, Opus and GPT debating, then the Arbiter card with a final decision.</desc>

  <defs>
    <filter id="soft" x="-10%" y="-20%" width="120%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="1"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.16"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#faf8f1"/>
      <stop offset="1" stop-color="#f0ecde"/>
    </linearGradient>

    <!-- avatar gradients (match the app) -->
    <radialGradient id="av-user" cx="0.35" cy="0.35"><stop offset="0" stop-color="#5485f5"/><stop offset="1" stop-color="#2247c4"/></radialGradient>
    <radialGradient id="av-opus" cx="0.35" cy="0.35"><stop offset="0" stop-color="#d97847"/><stop offset="1" stop-color="#a14b22"/></radialGradient>
    <radialGradient id="av-gpt"  cx="0.35" cy="0.35"><stop offset="0" stop-color="#2aaa57"/><stop offset="1" stop-color="#0d6b30"/></radialGradient>
    <radialGradient id="av-arb"  cx="0.35" cy="0.35"><stop offset="0" stop-color="#8e6dca"/><stop offset="1" stop-color="#553a8c"/></radialGradient>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="1280" height="720" fill="url(#bg)"/>

  <!-- main chat card -->
  <g filter="url(#soft)">
    <rect x="80" y="40" width="1120" height="640" rx="18" fill="#ffffff" stroke="#ece8dc" stroke-width="1"/>
  </g>

  <!-- header bar inside the card -->
  <g font-family="-apple-system, Segoe UI, system-ui, sans-serif">
    <rect x="80" y="40" width="1120" height="58" rx="18" fill="#fbfaf6"/>
    <rect x="80" y="76" width="1120" height="22" fill="#fbfaf6"/>
    <circle cx="118" cy="69" r="16" fill="#6d4ca8"/>
    <text x="118" y="74" text-anchor="middle" font-weight="700" font-size="12" fill="#ffffff">LC</text>
    <text x="148" y="65" font-size="16" font-weight="700" fill="#15171c">LocalCouncil</text>
    <text x="148" y="83" font-size="12" fill="#8a8779">debate — should we ship now or hold for the gate?</text>
    <line x1="80" y1="98" x2="1200" y2="98" stroke="#ece8dc"/>
  </g>

  <!-- MESSAGE 1: User asks (appears at t=0.5s of 12s cycle) -->
  <g opacity="0" font-family="-apple-system, Segoe UI, system-ui, sans-serif">
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.04;0.07;0.96;0.98;1"
             dur="12s" repeatCount="indefinite"/>
    <g transform="translate(120,128)">
      <circle cx="22" cy="22" r="22" fill="url(#av-user)"/>
      <circle cx="22" cy="16" r="6" fill="#ffffff"/>
      <path d="M 10 36 Q 22 26 34 36 Z" fill="#ffffff"/>
      <text x="58" y="20" font-size="14" font-weight="700" fill="#1f2430">You</text>
      <text x="92" y="20" font-size="11" fill="#b9b4a5">14:02:01</text>
      <text x="58" y="42" font-size="16" fill="#1f2430">opus, gpt — should i ship now or wait until the week-4 feedback gate?</text>
    </g>
  </g>

  <!-- MESSAGE 2: Opus replies (appears at t=2.5s) -->
  <g opacity="0" font-family="-apple-system, Segoe UI, system-ui, sans-serif">
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.20;0.23;0.96;0.98;1"
             dur="12s" repeatCount="indefinite"/>
    <g transform="translate(120,208)">
      <circle cx="22" cy="22" r="22" fill="url(#av-opus)"/>
      <text x="22" y="28" text-anchor="middle" font-weight="700" font-size="16" fill="#ffffff">A\</text>
      <text x="58" y="20" font-size="14" font-weight="700" fill="#1f2430">Opus 4.7</text>
      <text x="138" y="20" font-size="11" fill="#b9b4a5">14:02:08</text>
      <text x="58" y="42" font-size="16" fill="#1f2430">Ship. The week-4 gate measures users you don't have yet. Close the</text>
      <text x="58" y="62" font-size="16" fill="#1f2430">loop first, then run the gate honestly against real numbers.</text>
    </g>
  </g>

  <!-- MESSAGE 3: GPT pushes back (appears at t=5.0s) -->
  <g opacity="0" font-family="-apple-system, Segoe UI, system-ui, sans-serif">
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.41;0.44;0.96;0.98;1"
             dur="12s" repeatCount="indefinite"/>
    <g transform="translate(120,308)">
      <circle cx="22" cy="22" r="22" fill="url(#av-gpt)"/>
      <circle cx="22" cy="22" r="9" fill="none" stroke="#ffffff" stroke-width="2.5"/>
      <circle cx="22" cy="22" r="3" fill="#ffffff"/>
      <text x="58" y="20" font-size="14" font-weight="700" fill="#1f2430">GPT-5.5</text>
      <text x="138" y="20" font-size="11" fill="#b9b4a5">14:02:17</text>
      <text x="58" y="42" font-size="16" fill="#1f2430">Counter: shipping with the onboarding pothole means churn week 1</text>
      <text x="58" y="62" font-size="16" fill="#1f2430">contaminates the gate signal anyway. 48h fix + ship beats either</text>
      <text x="58" y="82" font-size="16" fill="#1f2430">pure side — the cost is half a day, the upside is fewer week-1 refunds.</text>
    </g>
  </g>

  <!-- MESSAGE 4: Opus concedes (appears at t=7.5s) -->
  <g opacity="0" font-family="-apple-system, Segoe UI, system-ui, sans-serif">
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.62;0.65;0.96;0.98;1"
             dur="12s" repeatCount="indefinite"/>
    <g transform="translate(120,428)">
      <circle cx="22" cy="22" r="22" fill="url(#av-opus)"/>
      <text x="22" y="28" text-anchor="middle" font-weight="700" font-size="16" fill="#ffffff">A\</text>
      <text x="58" y="20" font-size="14" font-weight="700" fill="#1f2430">Opus 4.7</text>
      <text x="138" y="20" font-size="11" fill="#b9b4a5">14:02:24</text>
      <text x="58" y="42" font-size="16" fill="#1f2430">Fair. 48h is cheap insurance. I withdraw the pure-ship line.</text>
    </g>
  </g>

  <!-- MESSAGE 5: Arbiter card (appears at t=9.0s) -->
  <g opacity="0" font-family="-apple-system, Segoe UI, system-ui, sans-serif">
    <animate attributeName="opacity"
             values="0;0;1;1;0;0"
             keyTimes="0;0.75;0.78;0.96;0.98;1"
             dur="12s" repeatCount="indefinite"/>
    <g transform="translate(120,498)">
      <!-- arbiter card background -->
      <rect x="0" y="0" width="1040" height="170" rx="14" fill="#f5f0ff" stroke="#d6c5f0" stroke-width="1.5"/>
      <rect x="0" y="0" width="6" height="170" rx="3" fill="#6d4ca8"/>
      <circle cx="32" cy="28" r="14" fill="url(#av-arb)"/>
      <text x="32" y="33" text-anchor="middle" font-weight="700" font-size="10" fill="#ffffff">ARB</text>
      <text x="60" y="32" font-size="13" font-weight="700" fill="#553a8c" letter-spacing="0.05em">ARBITER — DECISION</text>
      <text x="20" y="64" font-size="18" font-weight="700" fill="#15171c">Ship in 48 hours, after the onboarding fix.</text>
      <text x="20" y="92" font-size="13" font-weight="600" fill="#6d4ca8" letter-spacing="0.04em">RATIONALE</text>
      <text x="20" y="112" font-size="14" fill="#1f2430">Closes the feedback loop and protects the gate signal from week-1 churn noise.</text>
      <text x="20" y="138" font-size="13" font-weight="600" fill="#6d4ca8" letter-spacing="0.04em">NEXT TASKS</text>
      <text x="20" y="158" font-size="14" fill="#1f2430">• (opus) own the onboarding fix    • (you) rerun the gate at week 4</text>
    </g>
  </g>

  <!-- bottom caption -->
  <g font-family="-apple-system, Segoe UI, system-ui, sans-serif">
    <text x="640" y="708" text-anchor="middle" font-size="13" fill="#8a8779">LocalCouncil — two CLI-backed models debate, then an arbiter consolidates. No API keys; runs on your existing Claude Code and Codex CLI subscriptions.</text>
  </g>
</svg>
